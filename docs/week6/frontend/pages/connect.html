<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Connect Page</title>

    <link rel="stylesheet" href="../styles/main.css">

    <link rel="stylesheet" href="../components/atoms/heading.css">
    <link rel="stylesheet" href="../components/atoms/text.css">
    <link rel="stylesheet" href="../components/atoms/button.css">

    <div class="social-links" id="socialLinks"></div>

    <link rel="stylesheet" href="../components/organisms/connect-section.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

    <section class="connect-section">

        <!-- Decorative Background Circles -->
        <div class="background-left"></div>
        <div class="background-right"></div>

        <!-- Main Content -->
        <div class="content">

            <h1 class="main-heading">Let's Connect</h1>

            <p class="description">

            </p>

            <div class="social-links">
                <a href="#">Contact Me</a>
                <a href="#" class="button">LinkedIn</a>
                <a href="#">Twitter</a>
                <a href="#">Instagram</a>
            </div>

        </div>

    </section>
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            fetch('http://localhost:3000/api/socials')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('socialLinks');

                    container.innerHTML = "";

                    data.forEach(link => {
                        const a = document.createElement('a');

                        a.href = link.url;
                        a.target = "_blank";
                        a.rel = "noopener noreferrer";
                        a.textContent = link.name;
                        a.classList.add('button');

                        container.appendChild(a);
                    });
                })
                .catch(error => console.error("Fetch error:", error));

        });
    </script>
</body>

</html>
