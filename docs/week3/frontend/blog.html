<!DOCTYPE html>
<html>

<head>
    <title>Blog Posts</title>
    <link rel="stylesheet" href="styles/cards.css">
</head>

<body>

    <h1>Blog Posts</h1>

    <button id="add-post-btn">Add New Post</button>

    <div id="posts-container"></div>

    <!-- Correct script paths -->
    <script src="../components/card.js"></script>
    <script src="../components/form.js"></script>

    <script>
        async function loadPosts() {

            const schema = await fetch('../config/schemas/blog-post.json')
                .then(r => r.json());

            const posts = await fetch('/posts')
                .then(r => r.json());

            const container = document.getElementById('posts-container');

            posts.forEach(post => {
                const card = new DataCard(schema, post);
                container.appendChild(card.render());
            });

        }

        document.getElementById('add-post-btn').onclick = () => {
            // Show form to create new post
            alert('Form will appear here');
        };

        loadPosts();
    </script>

</body>

</html>
